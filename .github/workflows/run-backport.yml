name: Run Backport (manual/ref)

on:
  workflow_dispatch:
    inputs:
      action_ref_suffix:
        description: 'Only enter the ref (the part after the @), e.g. "main" or "feature/test"'
        required: true
        default: "main"
      detection_method:
        description: "Detection method used by the action (label, comment, custom)"
        required: true
        default: "custom"
      custom_input:
        description: "Custom input when detection_method=custom (comma-separated)"
        required: false
        default: "backport-to-v2.2.x"
      input_pattern:
        description: "Regex pattern to validate target branches"
        required: false
        default: '^v\\d+.\\d+.\\d+$'
      input_prefix:
        description: "Prefix for input values when using labels/custom"
        required: false
        default: "backport-to-"
      target_branch_prefix:
        description: "Prefix for created backport branches"
        required: false
        default: "backport/"
      dry_run:
        description: "If true, do not push or create PRs"
        required: false
        default: "true"

jobs:
  run-backport:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Backport Action
        uses: Nick-v-L/backport@${{ inputs.action_ref_suffix }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          detection-method: ${{ inputs.detection_method }}
          custom-input: "${{ inputs.custom_input }}"
          input-pattern: "${{ inputs.input_pattern }}"
          input-prefix: "${{ inputs.input_prefix }}"
          target-branch-prefix: "${{ inputs.target_branch_prefix }}"
          dry-run: "${{ inputs.dry_run }}"
