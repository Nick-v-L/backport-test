name: Run backport tests

on:
  repository_dispatch:
    types: [backport-test]

permissions:
  contents: write
  pull-requests: write
  checks: write

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run backport tests
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.BACKPORT_TEST_PAT }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const randomSuffix = Math.random().toString(36).substring(2,8);
            const timestamp = (new Date()).toISOString();

            async function createBranchFromMain(branch) {
              const mainRef = await github.rest.git.getRef({owner, repo, ref: 'heads/main'});
              await github.rest.git.createRef({owner, repo, ref: `refs/heads/${branch}`, sha: mainRef.data.object.sha});
            }

            async function deleteBranch(branch) {
              await github.rest.git.deleteRef({owner, repo, ref: `heads/${branch}`}).catch(()=>null);
            }

            async function updateFileOnBranch(branch, path, appendText) {
              const file = await github.rest.repos.getContent({owner, repo, path, ref: `heads/${branch}`}).catch(()=>null);
              let content = '';
              let sha = undefined;
              if (file && file.data && file.data.content) {
                content = Buffer.from(file.data.content, 'base64').toString('utf8');
                sha = file.data.sha;
              }
              content += '\n' + appendText + '\n';
              const newContent = Buffer.from(content, 'utf8').toString('base64');
              await github.rest.repos.createOrUpdateFileContents({owner, repo, path, message: `test(backport): append ${timestamp}`, content: newContent, branch, sha});
            }

            async function createPR(branch, title, body) {
              const pr = await github.rest.pulls.create({owner, repo, head: branch, base: 'main', title, body});
              return pr.data;
            }

            async function addComment(pr_number, body) {
              await github.rest.issues.createComment({owner, repo, issue_number: pr_number, body});
            }

            async function addLabel(pr_number, label) {
              // ensure label exists
              try {
                await github.rest.issues.getLabel({owner, repo, name: label});
              } catch (e) {
                await github.rest.issues.createLabel({owner, repo, name: label, color: 'ededed'});
              }
              await github.rest.issues.addLabels({owner, repo, issue_number: pr_number, labels: [label]});
            }

            async function mergePR(pr_number) {
              await github.rest.pulls.merge({owner, repo, pull_number: pr_number, merge_method: 'merge'});
            }

            async function pollForBackport(originalPrNumber, timeoutSec=60, intervalSec=5) {
              const deadline = Date.now() + timeoutSec*1000;
              while (Date.now() < deadline) {
                const pulls = await github.rest.pulls.list({owner, repo, state: 'open', per_page: 100});
                const found = pulls.data.find(p => {
                  const body = p.body || '';
                  const title = p.title || '';
                  return body.includes(`#${originalPrNumber}`) || title.toLowerCase().includes('backport') || p.head.ref.includes('backport');
                });
                if (found) return found;
                await new Promise(r => setTimeout(r, intervalSec*1000));
              }
              return null;
            }

            // Generic test runner
            async function runTest({testName, doComment, commentText, doLabel, labelText, resultBranch, deleteBackportBranch=true}) {
              const branch = `test/${testName}-${randomSuffix}`;
              await createBranchFromMain(branch);
              const appendText = `Auto test ${testName} - ${timestamp}`;
              await updateFileOnBranch(branch, `SAMPLE-CHANGE-${testName}.txt`, appendText);
              const title = `${testName} backport test ${timestamp}`;
              const body = `Automated test PR for backport (${testName})`;
              const pr = await createPR(branch, title, body);
              core.info(`Created PR #${pr.number}`);
              if (doComment) await addComment(pr.number, commentText);
              if (doLabel) await addLabel(pr.number, labelText);
              // merge the PR
              await mergePR(pr.number);
              core.info(`Merged PR #${pr.number}`);
              // poll for backport PR
              const backportPr = await pollForBackport(pr.number);
              if (!backportPr) {
                core.setFailed(`No backport PR detected for original PR #${pr.number}`);
                return false;
              }
              core.info(`Found backport PR #${backportPr.number}`);
              // attempt to merge backport PR when mergeable
              const attempts = 30;
              for (let i=0;i<attempts;i++) {
                const bp = await github.rest.pulls.get({owner, repo, pull_number: backportPr.number});
                if (bp.data.mergeable && bp.data.mergeable_state === 'clean') {
                  await mergePR(backportPr.number);
                  core.info(`Merged backport PR #${backportPr.number}`);
                  deleteBranch(branch).catch(()=>console.warn(`Failed to delete branch ${branch}`));
                  deleteBranch(`backport/${resultBranch}/pr-${pr.number}`).catch(()=>console.warn(`Failed to delete branch backport/${resultBranch}/pr-${backportPr.number}`));
                  if (deleteBackportBranch) {
                    deleteBranch(resultBranch).catch(()=>console.warn(`Failed to delete branch ${resultBranch}`));
                  }
                  return true;
                }
                await new Promise(r => setTimeout(r, 5000));
              }
              core.setFailed(`Backport PR #${backportPr.number} was not mergeable in time`);
              deleteBranch(branch).catch(()=>console.warn(`Failed to delete branch ${branch}`));
              deleteBranch(`backport/${resultBranch}/pr-${pr.number}`).catch(()=>console.warn(`Failed to delete branch backport/${resultBranch}/pr-${backportPr.number}`));
              if (deleteBackportBranch) {
                deleteBranch(resultBranch).catch(()=>console.warn(`Failed to delete branch ${resultBranch}`));
              }
              return false;
            }

            // Run three scenarios
            const commentOK = await runTest({testName: 'Comment', doComment: true, commentText: '/backport software-v1.1.x', resultBranch: 'software-v1.1.x'});
            const labelOK = await runTest({testName: 'Label', doLabel: true, labelText: 'backport-to-v2.4.x', resultBranch: 'v2.4.x'});
            const customOK = await runTest({testName: 'Custom', resultBranch: 'v3.3.x', deleteBackportBranch: false});

            if (!commentOK || !labelOK || !customOK) {
              core.setFailed('One or more backport tests failed');
            } else {
              core.info('All backport tests passed');
            }
