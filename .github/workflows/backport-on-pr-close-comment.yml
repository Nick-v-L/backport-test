name: Backport on PR Close (Comment)

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  backport:
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.title, 'COMMENT:')
    runs-on: ubuntu-latest
    steps:
      - name: Run Backport Action
        uses: Nick-v-L/backport@a34b59f66fd70fcce0084c4c482c4f2da04d9ea8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          detection-method: comment
          input-prefix: "backport-to-"
